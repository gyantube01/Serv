<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Servit | Home</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #0f172a; overflow: hidden; }
        .main-container { height: 100vh; width: 100%; display: flex; justify-content: center; align-items: center; position: relative; background: linear-gradient(180deg, #1e293b 0%, #0f172a 100%); }
        .bg-decoration { position: absolute; top: 0; left: 0; width: 100%; height: 45vh; background: linear-gradient(135deg, #2563eb 0%, #3b82f6 100%); clip-path: ellipse(120% 80% at 50% 0%); z-index: 1; }
        .active-tab { background: white; color: #2563eb; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

    <div class="main-container">
        <div class="bg-decoration">
            <div class="pt-12 text-center text-white relative z-10">
                <h1 class="text-3xl font-black tracking-widest uppercase">Servit</h1>
                <p class="text-blue-100 text-sm mt-1 opacity-80">Premium Auth System</p>
            </div>
        </div>

        <div class="relative z-10 w-full max-w-[420px] px-6">
            <div class="bg-white rounded-[32px] shadow-2xl p-8 md:p-10 w-full">
                
                <div id="authContent">
                    <div class="flex bg-gray-100 p-1 rounded-2xl mb-8">
                        <button id="loginTab" onclick="switchMode('login')" class="active-tab flex-1 py-3 text-sm font-bold rounded-xl transition-all">Login</button>
                        <button id="signupTab" onclick="switchMode('signup')" class="flex-1 py-3 text-sm font-bold rounded-xl transition-all text-gray-400">Sign Up</button>
                    </div>

                    <form onsubmit="handleAuth(event)" class="space-y-4">
                        <div id="nameDiv" class="hidden">
                            <input type="text" id="regName" placeholder="Full Name" class="w-full px-4 py-3.5 rounded-2xl bg-gray-50 border border-gray-100 outline-none">
                        </div>
                        <input type="email" id="email" placeholder="Email Address" required class="w-full px-4 py-3.5 rounded-2xl bg-gray-50 border border-gray-100 outline-none">
                        <div class="relative">
                            <input type="password" id="password" placeholder="Password" required class="w-full px-4 py-3.5 rounded-2xl bg-gray-50 border border-gray-100 outline-none">
                            <button type="button" onclick="showReset()" class="absolute right-0 -top-6 text-[10px] font-bold text-blue-600 hover:underline">Forgot?</button>
                        </div>
                        <div id="confirmDiv" class="hidden">
                            <input type="password" id="confirmPassword" placeholder="Confirm Password" class="w-full px-4 py-3.5 rounded-2xl bg-gray-50 border border-gray-100 outline-none">
                        </div>
                        <button type="submit" id="mainBtn" class="w-full py-4 mt-2 bg-blue-600 text-white font-bold rounded-2xl shadow-lg active:scale-95 transition-all">Sign In</button>
                    </form>
                </div>

                <div id="resetContent" class="hidden text-center">
                    <h2 class="text-xl font-bold text-gray-800">Reset Password</h2>
                    <p class="text-gray-400 text-sm mt-2 mb-6">Link aapke email par jayega.</p>
                    <input type="email" id="resetEmail" placeholder="Enter your email" class="w-full px-4 py-3.5 rounded-2xl bg-gray-50 border border-gray-100 outline-none mb-4">
                    <button onclick="handleResetRequest()" class="w-full py-4 bg-blue-600 text-white font-bold rounded-2xl shadow-lg active:scale-95 transition-all">Send Reset Link</button>
                    <button onclick="hideReset()" class="mt-6 text-sm font-bold text-gray-400 hover:text-blue-600">← Back to Login</button>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
  apiKey: "AIzaSyDWQkaGxDul7sFsOKdZh4uLPX4BUWZ9rCg",
  authDomain: "serrtt-785a5.firebaseapp.com",
  projectId: "serrtt-785a5",
  storageBucket: "serrtt-785a5.firebasestorage.app",
  messagingSenderId: "173207019492",
  appId: "1:173207019492:web:190483eb4909217b1631f1"
};

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        window.switchMode = (m) => {
            document.getElementById('nameDiv').classList.toggle('hidden', m === 'login');
            document.getElementById('confirmDiv').classList.toggle('hidden', m === 'login');
            document.getElementById('mainBtn').innerText = (m === 'login') ? "Sign In" : "Create Account";
        };

        window.showReset = () => { document.getElementById('authContent').classList.add('hidden'); document.getElementById('resetContent').classList.remove('hidden'); };
        window.hideReset = () => { document.getElementById('authContent').classList.remove('hidden'); document.getElementById('resetContent').classList.add('hidden'); };

        window.handleAuth = async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;
            try {
                if(document.getElementById('mainBtn').innerText === "Sign In") {
                    await signInWithEmailAndPassword(auth, email, pass);
                    alert("Login Successful! ✔");
                } else {
                    await createUserWithEmailAndPassword(auth, email, pass);
                    alert("Account Created! 🚀");
                }
            } catch (err) { alert("Error: " + err.message); }
        };

        window.handleResetRequest = async () => {
            const email = document.getElementById('resetEmail').value;
            const actionCodeSettings = {
                // Yahan apna reset page ka URL dalein
                url: window.location.href.replace('index.html', 'reset.html'), 
                handleCodeInApp: true,
            };
            try {
                await sendPasswordResetEmail(auth, email, actionCodeSettings);
                alert("✔ Reset link sent! Check your inbox.");
                hideReset();
            } catch (err) { alert("Error: " + err.message); }
        };
    </script>
</body>
</html>
